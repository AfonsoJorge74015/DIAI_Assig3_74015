<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Clubs')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2 class="mb-4">Campus Clubs</h2>

    <table class="table align-middle">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Description</th>
            <th>Events</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="club : ${clubs}">
            <td th:text="${club.name}">Chess Club</td>
            <td>
                <span class="badge bg-primary" th:text="${club.category}">ACADEMIC</span>
            </td>
            <td>
                <details>
                    <summary th:text="${#strings.abbreviate(club.description, 50)}">Summary...</summary>
                    <span class="text-muted small" th:text="${club.description}">Full description</span>
                </details>
            </td>

            <td>
                <span class="badge bg-info text-dark" th:text="${club.eventCount} + ' Events'">3 Events</span>
            </td>

            <td>
                <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-primary btn-sm">View Details</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
