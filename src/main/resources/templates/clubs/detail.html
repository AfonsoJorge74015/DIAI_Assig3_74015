<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${club.name})}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">
    <h1 class="display-5 fw-bold mb-2" th:text="${club.name}">Robotics Club</h1>

    <div class="mb-3">
        <span class="badge bg-primary text-uppercase" th:text="${club.category}">TECHNOLOGY</span>
    </div>

    <p class="lead fs-6 text-muted mb-4" th:text="${club.description}">
        The Robotics Club is the place to turn ideas into machines...
    </p>

    <div class="d-flex gap-2">
        <a th:href="@{/events(clubId=${club.id})}" class="btn btn-outline-primary">
            View Events
        </a>

        <a th:href="@{/clubs/{id}/events/new(id=${club.id})}" class="btn btn-success">
            + Add Event
        </a>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
