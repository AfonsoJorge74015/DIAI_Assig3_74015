<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit Event')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4 mb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/clubs}">Clubs</a></li>
            <li class="breadcrumb-item"><a th:href="@{/clubs/{id}(id=${club.id})}" th:text="${club.name}">Club Name</a></li>
            <li class="breadcrumb-item active" aria-current="page">Edit Event</li>
        </ol>
    </nav>

    <div class="card shadow-sm max-w-lg mx-auto" style="max-width: 600px;">
        <div class="card-body p-4">
            <h2 class="card-title mb-4">Edit Event</h2>

            <form th:action="@{/clubs/{clubId}/events/{eventId}(clubId=${club.id}, eventId=${event.id})}" th:object="${eventForm}" method="post">
                <input type="hidden" name="_method" value="PUT"/>

                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Event Name *</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
                </div>

                <div class="mb-3">
                    <label for="date" class="form-label fw-bold">Date *</label>
                    <input type="date" id="date" th:field="*{date}" class="form-control" th:classappend="${#fields.hasErrors('date')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">Date error</div>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label fw-bold">Event Type *</label>
                    <select id="type" th:field="*{type}" class="form-select" th:classappend="${#fields.hasErrors('type')} ? 'is-invalid' : ''">
                        <option value="">Select a type...</option>
                        <option th:each="t : ${eventTypes}" th:value="${t.id}" th:text="${t.name}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">Type error</div>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label fw-bold">Location</label>
                    <input type="text" id="location" th:field="*{location}" class="form-control" placeholder="Optional">
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label fw-bold">Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Optional"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">Update Event</button>
                </div>
            </form>

        </div>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
