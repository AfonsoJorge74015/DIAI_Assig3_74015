<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${event.name})}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/clubs}">Clubs</a></li>
            <li class="breadcrumb-item"><a th:href="@{/clubs/{id}(id=${club.id})}" th:text="${club.name}">Club Name</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${event.name}">Event Name</li>
        </ol>
    </nav>

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <h1 class="card-title display-6 fw-bold mb-2" th:text="${event.name}">Event Name</h1>
                    <span class="badge bg-secondary text-uppercase" th:text="${event.type}">TYPE</span>
                </div>

                <div class="d-flex gap-2">
                    <a th:href="@{/clubs/{clubId}/events/{eventId}/edit(clubId=${club.id}, eventId=${event.id})}" class="btn btn-outline-primary">Edit</a>
                    <a th:href="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${club.id}, eventId=${event.id})}" class="btn btn-outline-danger">Delete</a>
                </div>
            </div>

            <hr>

            <dl class="row mt-4">
                <dt class="col-sm-3 text-muted">Date</dt>
                <dd class="col-sm-9 fs-5" th:text="${#temporals.format(event.date, 'dd MMM yyyy')}">Date</dd>

                <dt class="col-sm-3 text-muted">Location</dt>
                <dd class="col-sm-9" th:text="${event.location ?: 'To Be Announced'}">Location</dd>

                <dt class="col-sm-3 text-muted">Organizing Club</dt>
                <dd class="col-sm-9">
                    <a th:href="@{/clubs/{id}(id=${club.id})}" th:text="${club.name}" class="text-decoration-none fw-bold">Club Name</a>
                </dd>

                <dt class="col-sm-3 text-muted">Description</dt>
                <dd class="col-sm-9" th:text="${event.description ?: 'No description provided.'}">Description</dd>
            </dl>

        </div>
    </div>

</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
