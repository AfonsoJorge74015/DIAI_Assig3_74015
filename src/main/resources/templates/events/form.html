<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Create Event')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4 mb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/clubs}">Clubs</a></li>
            <li class="breadcrumb-item"><a th:href="@{/clubs/{id}(id=${club.id})}" th:text="${club.name}">Club Name</a></li>
            <li class="breadcrumb-item active" aria-current="page">Create Event</li>
        </ol>
    </nav>

    <div class="card shadow-sm max-w-lg mx-auto" style="max-width: 600px;">
        <div class="card-body p-4">
            <h2 class="card-title mb-4">Register New Event</h2>

            <form th:action="@{/clubs/{clubId}/events(clubId=${club.id})}" th:object="${eventForm}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Event Name *</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
                </div>

                <div class="mb-3">
                    <label for="date" class="form-label fw-bold">Date *</label>
                    <input type="date" id="date" th:field="*{date}" class="form-control" th:classappend="${#fields.hasErrors('date')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">Date error</div>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label fw-bold">Event Type *</label>
                    <select id="type" th:field="*{type}" class="form-select" th:classappend="${#fields.hasErrors('type')} ? 'is-invalid' : ''">
                        <option value="">Select a type...</option>
                        <option th:each="t : ${eventTypes}" th:value="${t.name}" th:text="${t.name}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">Type error</div>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">Location</label>

                    <div class="input-group">
                        <input type="text" id="location" name="location" th:field="*{location}"
                               class="form-control" th:classappend="${#fields.hasErrors('location')} ? 'is-invalid' : ''">

                        <button type="button" class="btn btn-outline-secondary" onclick="checkWeatherJs()">
                            Check Weather JS
                        </button>

                        <button type="button" class="btn btn-outline-secondary"
                                hx-get="/api/weather"
                                hx-include="#location"
                                hx-target="#weather-result"
                                hx-swap="innerHTML">
                            Check Weather HTMX
                        </button>
                    </div>

                    <div class="invalid-feedback" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>

                    <div id="weather-result" class="mt-2"></div>
                </div>

                <script>
                    function checkWeatherJs() {
                        const loc = document.getElementById('location').value;
                        if (!loc) return;

                        fetch('/api/weather?location=' + encodeURIComponent(loc), {
                            headers: { 'Accept': 'application/json' }
                        })
                            .then(r => r.json())
                            .then(data => {
                                const container = document.getElementById('weather-result');
                                if (data.raining === true) {
                                    container.innerHTML = '<span class="badge bg-warning text-dark">Raining</span>';
                                } else if (data.raining === false) {
                                    container.innerHTML = '<span class="badge bg-success">Clear</span>';
                                } else {
                                    container.innerHTML = '<span class="text-secondary">Weather data unavailable.</span>';
                                }
                            });
                    }
                </script>

                <div class="mb-4">
                    <label for="description" class="form-label fw-bold">Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Optional"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">Create Event</button>
                </div>
            </form>

        </div>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
