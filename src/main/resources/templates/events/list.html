<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('All Events')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">
    <h1 class="mb-4">All Events</h1>

    <div class="card mb-4">
        <div class="card-header bg-light">Filter Events</div>
        <div class="card-body">
            <form th:action="@{/events}" method="get" class="row g-3 align-items-end">

                <div class="col-md-3">
                    <label for="type" class="form-label">Event Type</label>
                    <select id="type" name="type" class="form-select">
                        <option value="">All types</option>
                        <option th:each="t : ${eventTypes}"
                                th:value="${t.name}"
                                th:text="${t.name}"
                                th:selected="${param.type != null and param.type[0] == t.name}">
                        </option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="clubId" class="form-label">Club</label>
                    <select id="clubId" name="clubId" class="form-select">
                        <option value="">All clubs</option>
                        <option th:each="c : ${clubs}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${param.clubId != null and param.clubId[0] == c.id.toString()}">
                        </option>
                    </select>
                </div>

                <div class="col-md-auto">
                    <button type="submit" class="btn btn-primary">Filter</button>
                    <a th:href="@{/events}" class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <table class="table align-middle">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Club</th>
            <th>Date</th>
            <th>Type</th>
            <th>Location</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td>
                <a th:href="@{/clubs/{clubId}/events/{eventId}(clubId=${event.clubId}, eventId=${event.id})}" th:text="${event.name}">Event Name</a>
            </td>

            <td>
                <a th:href="@{/clubs/{id}(id=${event.clubId})}" th:text="${event.clubId}">Club Name</a>
            </td>

            <td th:text="${#temporals.format(event.date, 'dd MMM yyyy')}">Date</td>

            <td>
                <span class="badge bg-secondary text-uppercase" th:text="${event.type}">TYPE</span>
            </td>

            <td th:text="${event.location}">Location</td>

            <td>
                <div class="d-flex gap-2">
                    <a th:href="@{/clubs/{clubId}/events/{eventId}/edit(clubId=${event.clubId}, eventId=${event.id})}" class="btn btn-outline-primary btn-sm">Edit</a>
                    <a th:href="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${event.clubId}, eventId=${event.id})}" class="btn btn-outline-danger btn-sm">Delete</a>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(events)}">
            <td colspan="6" class="text-center text-muted">No events found matching your criteria.</td>
        </tr>
        </tbody>
    </table>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
